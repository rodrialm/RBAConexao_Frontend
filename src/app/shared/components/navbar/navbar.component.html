ng sfaadaasss<nav class="navbar-custom" aria-label="Navegação principal">
  <div class="navbar-container">
    <div class="navbar-left">
      <button pButton 
              type="button" 
              icon="pi pi-bars" 
              class="p-button-text p-button-rounded menu-toggle-btn"
              pTooltip="Menu"
              tooltipPosition="right"
              title="Abrir menu lateral"
              aria-label="Abrir menu lateral"
              (click)="onToggleSidebar()">
        <span class="visually-hidden">Menu</span>
      </button>
      
      <a routerLink="/dashboard" class="logo-link" aria-label="Página inicial">
        <div class="logo-container">
          <i class="pi pi-shield" aria-hidden="true"></i>
          <span class="logo-text">RBA-Firewall</span>
        </div>
      </a>
    </div>

    <div class="navbar-center">
      <ul class="nav-links">
        <li class="nav-item">
          <a routerLink="/dashboard" 
             routerLinkActive="active" 
             class="nav-link"
             title="Ir para página inicial"
             aria-label="Ir para página inicial">
            <i class="pi pi-chart-bar" aria-hidden="true"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/firewall" 
             routerLinkActive="active" 
             class="nav-link"
             title="Ir para firewall"
             aria-label="Ir para firewall">
            <i class="pi pi-shield" aria-hidden="true"></i>
            <span>Firewall</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/monitoramento" 
             routerLinkActive="active" 
             class="nav-link"
             title="Ir para monitoramento"
             aria-label="Ir para monitoramento">
            <span>Monitoramento</span>
          </a>
        </li>
                <li class="nav-item">
          <a routerLink="/configuracoes" 
             routerLinkActive="active" 
             class="nav-link"
             title="Ir para configurações"
             aria-label="Ir para configurações">
            <i class="pi pi-cog" aria-hidden="true"></i>
            <span>Configurações</span>
          </a>
        </li>
      </ul>
      
    </div>

    <div class="navbar-right">
      <p-menu #userMenu [model]="userMenuItems" [popup]="true"></p-menu>
      
      <button pButton 
              type="button" 
              class="p-button-text user-button"
              pTooltip="{{nomeUsuario}}"
              tooltipPosition="bottom"
              title="Menu do usuário"
              aria-label="Abrir menu do usuário"
              (click)="userMenu.toggle($event)">
        <p-avatar [label]="getInitials(nomeUsuario)" 
                  styleClass="user-avatar"
                  shape="circle"
                  [style]="{'background-color': '#6c757d', 'color': '#ffffff'}">
        </p-avatar>
        <span class="username-text">{{nomeUsuario}}</span>
        <i class="pi pi-chevron-down" aria-hidden="true"></i>
        <span class="visually-hidden">Abrir menu de opções do usuário</span>
      </button>
    </div>
  </div>
</nav>

<!-- Versão mobile - Menu hamburguer -->
<div class="mobile-navbar">
  <div class="mobile-navbar-container">
    <button pButton 
            type="button" 
            icon="pi pi-bars" 
            class="p-button-text mobile-menu-btn"
            title="Abrir menu"
            aria-label="Abrir menu"
            (click)="onToggleSidebar()">
      <span class="visually-hidden">Menu</span>
    </button>
    
    <a routerLink="/home" class="mobile-logo" title="Página inicial" aria-label="Página inicial">
      <i class="pi pi-shield" aria-hidden="true"></i>
      <span>RBA-Firewall</span>
    </a>
    
    <button pButton 
            type="button" 
            icon="pi pi-user"
            class="p-button-text mobile-user-btn"
            title="Menu do usuário"
            aria-label="Menu do usuário"
            (click)="userMenu.toggle($event)">
      <span class="visually-hidden">Menu do usuário</span>
    </button>
  </div>
</div>
<div>

   <i class="pi pi-chevron-down" aria-hidden="true"></i>
</div>
